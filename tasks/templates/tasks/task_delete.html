<!DOCTYPE html>
<html>
<head>
    <title>Delete Task</title>
</head>
<body>
    <h1>Delete Task</h1>

    <p>Are you sure you want to delete:</p>

    <strong>{{ task.title }}</strong>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, Delete</button>
    </form>

    <p>
        <a href="{% url 'dashboard' %}">Cancel</a>
    </p>
</body>
</html>
