<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Task Form</title>

<style>

body{
    font-family:'Segoe UI',sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:0;
}

.container{
    width:600px;
    margin:50px auto;
}

.card{
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    color:#0d6efd;
    margin-bottom:25px;
}

form p{
    margin-bottom:15px;
}

input,
textarea,
select{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:6px;
    background:#198754;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#157347;
}

.back{
    display:block;
    text-align:center;
    margin-top:15px;
    text-decoration:none;
    color:#0d6efd;
}

</style>

</head>

<body>

<div class="container">

    <div class="card">

        <h2>📝 Task Management</h2>

        <form method="post">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit">
                Save Task
            </button>

        </form>

        <a href="{% url 'dashboard' %}" class="back">
            ← Back to Dashboard
        </a>

    </div>

</div>

</body>
</html>
